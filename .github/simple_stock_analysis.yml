# 工作流名称
name: Simple Daily Stock Analysis

# 触发方式：仅手动触发（第5行，语法严格正确）
on:
  workflow_dispatch:

# 运行作业
jobs:
  run_stock_analysis:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 步骤2：配置Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 步骤3：安装依赖（含tavily）
      - name: Install required dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai tushare pandas numpy tavily-python

      # 步骤4：运行脚本（传递所有密钥）
      - name: Run stock analysis script
        env:
          GEMINI_API_KEY: ${{ secrets.gemini_api_key }}
          STOCK_LIST: ${{ secrets.stock_list }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          STOCK_DATA_API_KEY: ${{ secrets.STOCK_DATA_API_KEY }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
        run: |
          echo "✅ 密钥读取验证："
          echo "GEMINI_API_KEY: ${GEMINI_API_KEY:0:10}..."
          echo "STOCK_LIST: ${STOCK_LIST}"
          echo "STOCK_DATA_API_KEY: ${STOCK_DATA_API_KEY:0:10}..."
          echo "TAVILY_API_KEYS: ${TAVILY_API_KEYS:0:10}..."
          python main.py
